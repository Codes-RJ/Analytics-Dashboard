<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Folder Icon -->
  <rect x="50" y="70" width="100" height="60" rx="8" fill="#9CA3AF" opacity="0.3"/>
  <rect x="45" y="65" width="100" height="60" rx="8" fill="#6B7280" opacity="0.5"/>
  <rect x="40" y="60" width="100" height="60" rx="8" fill="#4B5563"/>
  
  <!-- Document Lines -->
  <line x1="65" y1="85" x2="115" y2="85" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="95" x2="100" y2="95" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="65" y1="105" x2="90" y2="105" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Magnifying Glass -->
  <circle cx="135" cy="125" r="20" fill="white" stroke="#3B82F6" stroke-width="3"/>
  <line x1="150" y1="140" x2="165" y2="155" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" fill="#6B7280" font-size="14" font-family="Arial">No Data Available</text>
  <text x="100" y="190" text-anchor="middle" fill="#9CA3AF" font-size="12" font-family="Arial">Upload a file to get started</text>
</svg>