<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#E5E7EB" stroke-width="8"/>
  
  <!-- Spinning Circle -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" stroke-dasharray="60 180">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 50 50" 
      to="360 50 50" 
      dur="1.5s" 
      repeatCount="indefinite"/>
  </circle>
  
  <!-- Pulsing Dots -->
  <circle cx="50" cy="20" r="4" fill="#3B82F6">
    <animate 
      attributeName="r" 
      values="4;6;4" 
      dur="1s" 
      repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="50" r="4" fill="#3B82F6">
    <animate 
      attributeName="r" 
      values="4;6;4" 
      dur="1s" 
      begin="0.3s" 
      repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="80" r="4" fill="#3B82F6">
    <animate 
      attributeName="r" 
      values="4;6;4" 
      dur="1s" 
      begin="0.6s" 
      repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="50" r="4" fill="#3B82F6">
    <animate 
      attributeName="r" 
      values="4;6;4" 
      dur="1s" 
      begin="0.9s" 
      repeatCount="indefinite"/>
  </circle>
  
  <!-- Loading Text -->
  <text x="50" y="95" text-anchor="middle" fill="#6B7280" font-size="12" font-family="Arial">Loading...</text>
</svg>